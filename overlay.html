<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overlay - TikTok Subasta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  .overlay {
    display: flex;
    align-items: stretch;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    min-width: 360px;
    font-family: 'Bebas Neue', sans-serif;
  }

  .block {
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }

  .timer-block {
    background: var(--color, #fe2c55);
    min-width: 130px;
  }

  .leader-block {
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    border-left: 3px solid var(--color, #fe2c55);
    min-width: 200px;
  }

  .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }

  .timer-val {
    font-size: 52px;
    color: white;
    line-height: 1;
    letter-spacing: 3px;
  }

  .timer-val.snide {
    color: #25f4ee;
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .leader-name {
    font-size: 24px;
    color: white;
    letter-spacing: 1px;
    line-height: 1;
  }

  .leader-tokens {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #ffd700;
    margin-top: 2px;
  }

  /* Animate in */
  .overlay {
    animation: slideDown 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes slideDown {
    from { transform: translateY(-100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlayBox">
  <div class="block timer-block">
    <div class="lbl">⏱ Tiempo</div>
    <div class="timer-val" id="timerVal">0:00</div>
  </div>
  <div class="block leader-block">
    <div class="lbl">🏆 Líder</div>
    <div class="leader-name" id="leaderName">—</div>
    <div class="leader-tokens" id="leaderTokens">🪙 0 tokens</div>
  </div>
</div>

<script>
  // ── Lee parámetros de la URL ──────────────────────────────
  // Ejemplo de URL:
  // overlay.html?timer=3%3A00&leader=%40usuario&tokens=500&color=%23fe2c55&snide=false&show_tokens=true

  function getParam(name, def) {
    const p = new URLSearchParams(window.location.search);
    return p.has(name) ? p.get(name) : def;
  }

  // Aplica color
  const color = getParam('color', '#fe2c55');
  document.documentElement.style.setProperty('--color', color);

  // Rellena valores iniciales
  document.getElementById('timerVal').textContent    = getParam('timer', '0:00');
  document.getElementById('leaderName').textContent  = getParam('leader', '—');

  const showTokens = getParam('show_tokens', 'true') === 'true';
  const tokensEl = document.getElementById('leaderTokens');
  if (showTokens) {
    tokensEl.textContent = '🪙 ' + getParam('tokens', '0') + ' tokens';
  } else {
    tokensEl.style.display = 'none';
  }

  const isSnide = getParam('snide', 'false') === 'true';
  if (isSnide) document.getElementById('timerVal').classList.add('snide');

  // ── Polling: recarga los parámetros cada segundo ──────────
  // El panel principal actualiza la URL del iframe automáticamente.
  // Si usas BroadcastChannel (mismo dominio), también funciona.

  const bc = new BroadcastChannel('subasta_overlay');
  bc.onmessage = (e) => {
    const d = e.data;
    if (d.timer   !== undefined) document.getElementById('timerVal').textContent   = d.timer;
    if (d.leader  !== undefined) document.getElementById('leaderName').textContent = d.leader;
    if (d.tokens  !== undefined && showTokens) tokensEl.textContent = '🪙 ' + d.tokens + ' tokens';
    if (d.snide   !== undefined) document.getElementById('timerVal').classList.toggle('snide', d.snide);
    if (d.color   !== undefined) document.documentElement.style.setProperty('--color', d.color);
  };
</script>
</body>
</html>
